{% extends "base.html" %}
{% block title %}登录 · 光核安利漂流瓶{% endblock %}
{% block content %}
<div class="auth-box">
    <h2>🌊 欢迎登船</h2>
    <p class="sub">输入QQ号，即刻开始漂流</p>
    <form method="POST" action="{{ url_for('login') }}{% if ref_id %}?ref={{ ref_id }}{% elif via %}?via={{ via }}{% endif %}">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
        <div class="form-g">
            <label>🐧 QQ号</label>
            <input type="text" name="qq" class="input" placeholder="请输入QQ号" inputmode="numeric" pattern="[0-9]{5,15}" required autofocus>
        </div>
        <div class="form-g">
            <label>😎 昵称 <span class="hint">（选填，新用户可留空）</span></label>
            <input type="text" name="nickname" class="input" placeholder="给自己起个名字，不填默认用QQ号">
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="padding:14px;font-size:16px;">🌊 登船漂流</button>
    </form>
    <p class="switch">首次使用？输入QQ号即可自动注册 🎉</p>
</div>
{% endblock %}
